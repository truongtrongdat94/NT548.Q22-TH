name: Manual – Infrastructure Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm'
        required: true
        type: string
      destroy_vpc:
        description: 'Also destroy VPC + NAT Gateway?'
        required: false
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

permissions:
  contents: read
  id-token: write

jobs:
  setup:
    name: Load Config
    runs-on: ubuntu-latest
    outputs:
      aws_region:                      ap-southeast-1
      project_name:                    eventfund
      environment:                     prod
      terraform_version:               1.7.0
      tf_eks_version:                  1.33
      tf_node_instance_type:           m7i-flex.large
      tf_node_desired_capacity:        2
      tf_node_min_capacity:            1
      tf_node_max_capacity:            4
      tf_vpc_cidr:                     ${{ vars.TF_VPC_CIDR }}
      tf_public_subnets_cidr:          ${{ vars.TF_PUBLIC_SUBNETS_CIDR }}
      tf_private_subnets_cidr:         ${{ vars.TF_PRIVATE_SUBNETS_CIDR }}
      tf_azs:                          ${{ vars.TF_AZS }}
      ecr_backend_repository:          ${{ vars.ECR_BACKEND_REPOSITORY }}
      github_actions_role_name:        ${{ vars.AWS_OIDC_ROLE_NAME }}
      s3_security_reports_bucket:      ${{ vars.S3_SECURITY_REPORTS_BUCKET }}
      security_reports_retention_days: 15
      argocd_repo_url:                 https://github.com/truongtrongdat94/Eventfund-platform.git

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: ./.github/actions/setup-aws
        with:
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ap-southeast-1
          role_name: ${{ vars.AWS_OIDC_ROLE_NAME }}

  destroy:
    name: Destroy Billable AWS Resources
    runs-on: ubuntu-latest
    needs: setup
    if: github.event.inputs.confirm == 'destroy'
    timeout-minutes: 60
    
    environment: production-infra

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: ./.github/actions/setup-aws
        with:
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ap-southeast-1
          role_name: ${{ vars.AWS_OIDC_ROLE_NAME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.setup.outputs.terraform_version }}
          terraform_wrapper: false

      - name: Setup Terraform plugin cache directory
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-plugins-${{ runner.os }}-${{ hashFiles('terraform/**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-plugins-${{ runner.os }}-

      - name: Generate terraform.auto.tfvars.json
        uses: ./.github/actions/generate-terraform-tfvars
        with:
          aws_region: ${{ needs.setup.outputs.aws_region }}
          project_name: ${{ needs.setup.outputs.project_name }}
          environment: ${{ needs.setup.outputs.environment }}
          vpc_cidr: ${{ needs.setup.outputs.tf_vpc_cidr }}
          public_subnets_cidr: ${{ needs.setup.outputs.tf_public_subnets_cidr }}
          private_subnets_cidr: ${{ needs.setup.outputs.tf_private_subnets_cidr }}
          azs: ${{ needs.setup.outputs.tf_azs }}
          eks_version: ${{ needs.setup.outputs.tf_eks_version }}
          node_instance_type: ${{ needs.setup.outputs.tf_node_instance_type }}
          node_desired_capacity: ${{ needs.setup.outputs.tf_node_desired_capacity }}
          node_min_capacity: ${{ needs.setup.outputs.tf_node_min_capacity }}
          node_max_capacity: ${{ needs.setup.outputs.tf_node_max_capacity }}
          ecr_backend_repository: ${{ needs.setup.outputs.ecr_backend_repository }}
          github_actions_role_name: ${{ needs.setup.outputs.github_actions_role_name }}
          github_repository: ${{ github.repository }}
          s3_security_reports_bucket: ${{ needs.setup.outputs.s3_security_reports_bucket }}
          security_reports_retention_days: ${{ needs.setup.outputs.security_reports_retention_days }}
          argocd_repo_url: ${{ needs.setup.outputs.argocd_repo_url }}
          argocd_target_revision: master
          argocd_app_namespace: eventfund-dev

      - name: "[1/3] Destroy Services"
        id: destroy_services
        working-directory: terraform/services
        timeout-minutes: 20
        run: |
          aws eks update-kubeconfig \
            --region ${{ needs.setup.outputs.aws_region }} \
            --name ${{ needs.setup.outputs.project_name }} \
            2>/dev/null || echo " Could not configure kubectl (cluster may not exist)"
          
          terraform init
          terraform destroy -auto-approve
        continue-on-error: false

      - name: Wait for ALB cleanup
        timeout-minutes: 10
        run: |
          echo "Waiting 30s for ALB Controller to cleanup ALBs/ENIs..."
          sleep 30

      - name: "[2/3] Destroy Cluster (EKS)"
        id: destroy_cluster
        working-directory: terraform/cluster
        timeout-minutes: 30
        run: |
          terraform init
          terraform destroy -auto-approve
        continue-on-error: false

      - name: "[3/3] Destroy VPC (Optional)"
        id: destroy_vpc
        if: github.event.inputs.destroy_vpc == 'yes'
        working-directory: terraform/persistent
        timeout-minutes: 30
        run: |
          terraform init
          
          terraform destroy \
            -target=module.vpc \
            -auto-approve
