name: Reusable – Deploy Backend

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (commit SHA from CI run).'
        type: string
        required: true
      environment:
        description: 'Target environment (dev or prod).'
        type: string
        default: 'dev'
      branch:
        description: 'Branch to commit GitOps change back to (matches CI run branch).'
        type: string
        required: true
    secrets:
      AWS_ACCOUNT_ID:
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Configure AWS
        uses: ./.github/actions/setup-aws
        with:
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          role_name: ${{ vars.AWS_OIDC_ROLE_NAME }}

      - name: Set environment variables
        run: |
          # AWS
          echo "AWS_REGION=${{ vars.AWS_REGION }}" >> $GITHUB_ENV
          echo "ECR_BACKEND_REPOSITORY=${{ vars.ECR_BACKEND_REPOSITORY }}" >> $GITHUB_ENV
          
          # Build ECR URL
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_BACKEND_REPOSITORY_URL=${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_BACKEND_REPOSITORY }}" >> $GITHUB_ENV
          
          # K8s namespace (dev/prod logic)
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "K8S_NAMESPACE=${{ vars.K8S_NAMESPACE_PROD }}" >> $GITHUB_ENV
          else
            echo "K8S_NAMESPACE=${{ vars.K8S_NAMESPACE_DEV }}" >> $GITHUB_ENV
          fi
          
          # K8s configs from YAML
          echo "K8S_BACKEND_PORT=4000" >> $GITHUB_ENV
          echo "K8S_LOG_LEVEL=info" >> $GITHUB_ENV
          echo "K8S_AUTO_EVENT_LIFECYCLE_ENABLED=true" >> $GITHUB_ENV
          echo "K8S_AUTO_EVENT_LIFECYCLE_INTERVAL_MS=60000" >> $GITHUB_ENV
          echo "K8S_AUTO_EVENT_LIFECYCLE_SCAN_LIMIT=50" >> $GITHUB_ENV
          echo "K8S_AUTO_TICKETING_DEFAULT_TYPE=standard" >> $GITHUB_ENV
          echo "K8S_CHAIN_LOG_CHUNK_SIZE=500" >> $GITHUB_ENV
          echo "K8S_CONTRACTS_ARTIFACTS_DIR=./artifacts" >> $GITHUB_ENV
          echo "PROJECT_NAME=eventfund" >> $GITHUB_ENV

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Render backend ConfigMap into overlay
        env:
          NODE_ENV: ${{ inputs.environment == 'prod' && 'PROD' || 'DEV' }}
          BACKEND_PORT: ${{ env.K8S_BACKEND_PORT }}
          LOG_LEVEL: ${{ env.K8S_LOG_LEVEL }}
          AUTO_EVENT_LIFECYCLE_ENABLED: ${{ env.K8S_AUTO_EVENT_LIFECYCLE_ENABLED }}
          AUTO_EVENT_LIFECYCLE_INTERVAL_MS: ${{ env.K8S_AUTO_EVENT_LIFECYCLE_INTERVAL_MS }}
          AUTO_EVENT_LIFECYCLE_SCAN_LIMIT: ${{ env.K8S_AUTO_EVENT_LIFECYCLE_SCAN_LIMIT }}
          AUTO_TICKETING_DEFAULT_TYPE: ${{ env.K8S_AUTO_TICKETING_DEFAULT_TYPE }}
          CHAIN_LOG_CHUNK_SIZE: ${{ env.K8S_CHAIN_LOG_CHUNK_SIZE }}
          CONTRACTS_ARTIFACTS_DIR: ${{ env.K8S_CONTRACTS_ARTIFACTS_DIR }}
        run: |
          set -euo pipefail
          OVERLAY_DIR="k8s/overlays/${{ inputs.environment }}"
          TEMPLATE="k8s/base/backend/configmap.yaml.tpl"
          TARGET="${OVERLAY_DIR}/backend-configmap-patch.yaml"

          if [ ! -f "$TEMPLATE" ]; then
            echo "Template not found: $TEMPLATE"
            exit 1
          fi

          envsubst < "$TEMPLATE" > "$TARGET"
          echo "Rendered $TARGET"

      - name: Update image tag in overlay kustomization.yaml
        env:
          ECR_URL: ${{ env.ECR_BACKEND_REPOSITORY_URL }}
          NEW_TAG: ${{ inputs.image_tag }}
          OVERLAY: k8s/overlays/${{ inputs.environment }}/kustomization.yaml
        run: |
          set -euo pipefail

          yq -i \
            '(.images[] | select(.name == "eventfund-backend").newName) = strenv(ECR_URL)
             | (.images[] | select(.name == "eventfund-backend").newTag) = strenv(NEW_TAG)' \
            "$OVERLAY"

          echo "Updated overlay image to: ${ECR_URL}:${NEW_TAG}"

          kustomize build "k8s/overlays/${{ inputs.environment }}" > /dev/null \
            || { echo "kustomize build failed"; exit 1; }

      - name: Commit and push overlay changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci(deploy): update ${{ inputs.environment }} backend image to ${{ inputs.image_tag }}"
          file_pattern: |
            k8s/overlays/${{ inputs.environment }}/kustomization.yaml
            k8s/overlays/${{ inputs.environment }}/backend-configmap-patch.yaml
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>

      - name: Verify Argo Rollouts apply (rollout/api)
        env:
          NAMESPACE: ${{ env.K8S_NAMESPACE }}
          AWS_REGION: ${{ env.AWS_REGION }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          ECR_URL: ${{ env.ECR_BACKEND_REPOSITORY_URL }}
        run: |
          set -euo pipefail

          # Single EKS cluster (named after project) hosts both dev/prod via separate namespaces.
          CLUSTER_NAME="${{ env.PROJECT_NAME }}"

          # Check if cluster exists before attempting to connect
          echo "Checking if EKS cluster exists: ${CLUSTER_NAME}"
          if ! aws eks describe-cluster --region "${AWS_REGION}" --name "${CLUSTER_NAME}" &>/dev/null; then
            echo "EKS cluster '${CLUSTER_NAME}' does not exist or is not accessible."
            echo "This is expected if the cluster was destroyed to save costs."
            echo "GitOps commit was successful. Deployment will apply when cluster is recreated."
            exit 0
          fi

          echo "Cluster exists. Updating kubeconfig for cluster: ${CLUSTER_NAME}"
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${CLUSTER_NAME}"

          # Wait for ArgoCD to pick up the commit and patch the rollout image.
          # Note: workload `api` uses kind: Rollout (Argo Rollouts blue-green), not Deployment.
          DEADLINE=$((SECONDS + 600))   # 10 min wait for ArgoCD pickup
          EXPECTED="${ECR_URL}:${IMAGE_TAG}"
          echo "Waiting for rollout/api in ${NAMESPACE} to reach image ${EXPECTED}"

          while [ $SECONDS -lt $DEADLINE ]; do
            CURRENT=$(kubectl -n "${NAMESPACE}" get rollout/api \
              -o jsonpath='{.spec.template.spec.containers[?(@.name=="api")].image}' 2>/dev/null || echo "")
            if [ "${CURRENT}" = "${EXPECTED}" ]; then
              echo "ArgoCD has applied target image to Rollout."
              break
            fi
            echo "Current: '${CURRENT}'  (target ${EXPECTED}) — waiting..."
            sleep 15
          done

          if [ "${CURRENT:-}" != "${EXPECTED}" ]; then
            echo "ArgoCD did not apply target image within 10 minutes."
            kubectl -n "${NAMESPACE}" describe rollout/api | tail -80 || true
            exit 1
          fi

          # Wait until Argo Rollouts reaches a terminal state:
          #   - Paused   = pre-promotion analysis passed, awaiting manual promote (autoPromotion=false). SUCCESS.
          #   - Healthy  = first deploy or already-promoted. SUCCESS.
          #   - Degraded = analysis failed or pods crashing. FAIL.
          ROLLOUT_DEADLINE=$((SECONDS + 600))   # 10 min for analysis + green readiness
          echo "Waiting for rollout/api to reach Paused/Healthy/Degraded..."

          while [ $SECONDS -lt $ROLLOUT_DEADLINE ]; do
            PHASE=$(kubectl -n "${NAMESPACE}" get rollout/api \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            MESSAGE=$(kubectl -n "${NAMESPACE}" get rollout/api \
              -o jsonpath='{.status.message}' 2>/dev/null || echo "")
            echo "Phase: '${PHASE}'  Message: '${MESSAGE}'"

            case "${PHASE}" in
              Paused)
                echo ""
                echo "Rollout is PAUSED. Pre-promotion analysis passed."
                echo "Action required: manually promote when ready:"
                echo "  kubectl argo rollouts promote api -n ${NAMESPACE}"
                echo ""
                kubectl -n "${NAMESPACE}" get rollout/api -o wide || true
                exit 0
                ;;
              Healthy)
                echo "Rollout is Healthy (no blue-green switch needed — first deploy or already promoted)."
                exit 0
                ;;
              Degraded)
                echo "Rollout is DEGRADED. Pre-promotion analysis failed or pods crashing."
                kubectl -n "${NAMESPACE}" describe rollout/api | tail -80 || true
                kubectl -n "${NAMESPACE}" get analysisrun -l rollout-type=BlueGreen 2>/dev/null || true
                exit 1
                ;;
            esac
            sleep 15
          done

          echo "Rollout did not reach a terminal phase within 10 minutes (phase='${PHASE:-unknown}')."
          kubectl -n "${NAMESPACE}" describe rollout/api | tail -80 || true
          exit 1
