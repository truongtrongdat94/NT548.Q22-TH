name: Reusable – Deploy Frontend

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Commit SHA from the CI run (used for checkout to lock to CI revision).'
        type: string
        required: true
      environment:
        description: 'Target environment (dev or prod).'
        type: string
        default: 'dev'
      workflow_run_id:
        description: 'CI workflow_run.id used to download the pre-built frontend artifact.'
        type: string
        required: true
    secrets:
      AWS_ACCOUNT_ID:
        required: true

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repo at CI revision
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.image_tag }}
          persist-credentials: false

      - name: Configure AWS
        uses: ./.github/actions/setup-aws
        with:
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          role_name: ${{ vars.AWS_OIDC_ROLE_NAME }}

      - name: Set environment variables
        run: |
          echo "AWS_REGION=${{ vars.AWS_REGION }}" >> $GITHUB_ENV
          
          # S3 bucket and CloudFront (dev/prod logic)
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "FRONTEND_S3_BUCKET=${{ vars.FRONTEND_BUCKET_PROD }}" >> $GITHUB_ENV
            echo "CLOUDFRONT_DISTRIBUTION_ID=${{ vars.CLOUDFRONT_DIST_ID_PROD }}" >> $GITHUB_ENV
          else
            echo "FRONTEND_S3_BUCKET=${{ vars.FRONTEND_BUCKET_DEV }}" >> $GITHUB_ENV
            echo "CLOUDFRONT_DISTRIBUTION_ID=${{ vars.CLOUDFRONT_DIST_ID_DEV }}" >> $GITHUB_ENV
          fi

      - name: Download frontend artifact from CI run
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ inputs.image_tag }}
          path: frontend/dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.workflow_run_id }}

      - name: Upload to S3
        run: |
          set -euo pipefail
          aws s3 sync frontend/dist/ "s3://${{ env.FRONTEND_S3_BUCKET }}/" \
            --follow-symlinks \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --region "${{ env.AWS_REGION }}"

      - name: Invalidate CloudFront cache
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}
          PATHS: "/*"
          AWS_REGION: ${{ env.AWS_REGION }}
