name: Reusable – Frontend

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment (dev or prod) — selects which SSM prefix to fetch VITE_* env from.'
        type: string
        default: 'dev'
    secrets:
      AWS_ACCOUNT_ID:
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure AWS
        uses: ./.github/actions/setup-aws
        with:
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          role_name: ${{ vars.AWS_OIDC_ROLE_NAME }}

      - name: Set environment variables
        run: |
          echo "AWS_REGION=${{ vars.AWS_REGION }}" >> $GITHUB_ENV
          echo "NODE_VERSION=20.19.0" >> $GITHUB_ENV

      - name: Pull frontend env from AWS SSM
        run: |
          set -euo pipefail

          ENVIRONMENT="${{ inputs.environment }}"
          SSM_PREFIX="/eventfund/${ENVIRONMENT}/frontend"
          ENV_FILE="frontend/.env"

          # Truncate any pre-existing .env to avoid stale values bleeding in.
          : > "$ENV_FILE"

          aws ssm get-parameters-by-path \
            --path "$SSM_PREFIX" \
            --recursive \
            --with-decryption \
            --region "${{ env.AWS_REGION }}" \
            --query 'Parameters[*].[Name,Value]' \
            --output json | \
          jq -r --arg prefix "$SSM_PREFIX/" '.[] | (.[0] | sub("^" + $prefix; "")) + "=" + .[1]' \
            >> "$ENV_FILE"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Cleanup env file before artifact upload
        if: always()
        run: rm -f frontend/.env

      - name: Upload dist artifact for CD
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7
