name: Manual – Infrastructure Apply

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "apply" to confirm'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  # AWS
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_BACKEND_REPOSITORY: ${{ vars.ECR_BACKEND_REPOSITORY }}
  AWS_OIDC_ROLE_NAME: ${{ vars.AWS_OIDC_ROLE_NAME }}
  
  # S3
  S3_SECURITY_REPORTS_BUCKET: ${{ vars.S3_SECURITY_REPORTS_BUCKET }}
  
  # Terraform VPC
  TF_VPC_CIDR: ${{ vars.TF_VPC_CIDR }}
  TF_PUBLIC_SUBNETS_CIDR: ${{ vars.TF_PUBLIC_SUBNETS_CIDR }}
  TF_PRIVATE_SUBNETS_CIDR: ${{ vars.TF_PRIVATE_SUBNETS_CIDR }}
  TF_AZS: ${{ vars.TF_AZS }}
  
  # CloudFront
  CLOUDFRONT_DEV_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DIST_ID_DEV }}
  CLOUDFRONT_PROD_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DIST_ID_PROD }}
  
  # Static configs
  PROJECT_NAME: eventfund
  ENVIRONMENT: prod
  TERRAFORM_VERSION: 1.7.0
  TF_EKS_VERSION: 1.33
  TF_NODE_INSTANCE_TYPE: m7i-flex.large
  TF_NODE_DESIRED_CAPACITY: 2
  TF_NODE_MIN_CAPACITY: 1
  TF_NODE_MAX_CAPACITY: 4
  SECURITY_REPORTS_RETENTION_DAYS: 15
  ARGOCD_REPO_URL: https://github.com/truongtrongdat94/Eventfund-platform.git
  ARGOCD_TARGET_REVISION: dev
  ARGOCD_APP_NAMESPACE: eventfund-dev

jobs:
  apply-persistent:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'apply'
    timeout-minutes: 30
    
    environment: production-infra

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure AWS
        uses: ./.github/actions/setup-aws
        with:
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          role_name: ${{ env.AWS_OIDC_ROLE_NAME }}

      - name: Setup Terraform plugin cache directory
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-plugins-${{ runner.os }}-${{ hashFiles('terraform/**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-plugins-${{ runner.os }}-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Generate terraform.auto.tfvars.json
        uses: ./.github/actions/generate-terraform-tfvars
        with:
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          environment: ${{ env.ENVIRONMENT }}
          vpc_cidr: ${{ env.TF_VPC_CIDR }}
          public_subnets_cidr: ${{ env.TF_PUBLIC_SUBNETS_CIDR }}
          private_subnets_cidr: ${{ env.TF_PRIVATE_SUBNETS_CIDR }}
          azs: ${{ env.TF_AZS }}
          eks_version: ${{ env.TF_EKS_VERSION }}
          node_instance_type: ${{ env.TF_NODE_INSTANCE_TYPE }}
          node_desired_capacity: ${{ env.TF_NODE_DESIRED_CAPACITY }}
          node_min_capacity: ${{ env.TF_NODE_MIN_CAPACITY }}
          node_max_capacity: ${{ env.TF_NODE_MAX_CAPACITY }}
          ecr_backend_repository: ${{ env.ECR_BACKEND_REPOSITORY }}
          github_actions_role_name: ${{ env.AWS_OIDC_ROLE_NAME }}
          github_repository: ${{ github.repository }}
          s3_security_reports_bucket: ${{ env.S3_SECURITY_REPORTS_BUCKET }}
          security_reports_retention_days: ${{ env.SECURITY_REPORTS_RETENTION_DAYS }}
          argocd_repo_url: ${{ env.ARGOCD_REPO_URL }}
          argocd_target_revision: ${{ env.ARGOCD_TARGET_REVISION }}
          argocd_app_namespace: ${{ env.ARGOCD_APP_NAMESPACE }}

      - name: Terraform Init (Persistent)
        working-directory: terraform/persistent
        timeout-minutes: 10
        run: terraform init

      - name: Terraform Plan (Persistent)
        working-directory: terraform/persistent
        timeout-minutes: 10
        run: terraform plan

      - name: "[1/3] Apply Persistent State (VPC, ECR, S3, CloudFront, IAM)"
        working-directory: terraform/persistent
        timeout-minutes: 20
        run: |
          terraform apply -auto-approve
          echo " Persistent resources applied"

  apply-cluster:
    runs-on: ubuntu-latest
    needs: apply-persistent
    timeout-minutes: 45
    
    environment: production-infra

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure AWS
        uses: ./.github/actions/setup-aws
        with:
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          role_name: ${{ env.AWS_OIDC_ROLE_NAME }}

      - name: Setup Terraform plugin cache directory
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-plugins-${{ runner.os }}-${{ hashFiles('terraform/**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-plugins-${{ runner.os }}-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Generate terraform.auto.tfvars.json
        uses: ./.github/actions/generate-terraform-tfvars
        with:
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          environment: ${{ env.ENVIRONMENT }}
          vpc_cidr: ${{ env.TF_VPC_CIDR }}
          public_subnets_cidr: ${{ env.TF_PUBLIC_SUBNETS_CIDR }}
          private_subnets_cidr: ${{ env.TF_PRIVATE_SUBNETS_CIDR }}
          azs: ${{ env.TF_AZS }}
          eks_version: ${{ env.TF_EKS_VERSION }}
          node_instance_type: ${{ env.TF_NODE_INSTANCE_TYPE }}
          node_desired_capacity: ${{ env.TF_NODE_DESIRED_CAPACITY }}
          node_min_capacity: ${{ env.TF_NODE_MIN_CAPACITY }}
          node_max_capacity: ${{ env.TF_NODE_MAX_CAPACITY }}
          ecr_backend_repository: ${{ env.ECR_BACKEND_REPOSITORY }}
          github_actions_role_name: ${{ env.AWS_OIDC_ROLE_NAME }}
          github_repository: ${{ github.repository }}
          s3_security_reports_bucket: ${{ env.S3_SECURITY_REPORTS_BUCKET }}
          security_reports_retention_days: ${{ env.SECURITY_REPORTS_RETENTION_DAYS }}
          argocd_repo_url: ${{ env.ARGOCD_REPO_URL }}
          argocd_target_revision: ${{ env.ARGOCD_TARGET_REVISION }}
          argocd_app_namespace: ${{ env.ARGOCD_APP_NAMESPACE }}

      - name: Terraform Init (Cluster)
        working-directory: terraform/cluster
        timeout-minutes: 10
        run: terraform init

      - name: Terraform Plan (Cluster)
        working-directory: terraform/cluster
        timeout-minutes: 15
        run: terraform plan

      - name: "[2/3] Apply Cluster State (EKS, Node Group, NAT)"
        working-directory: terraform/cluster
        timeout-minutes: 30
        run: |
          terraform apply -auto-approve

  apply-services:
    runs-on: ubuntu-latest
    needs: apply-cluster
    timeout-minutes: 45
    
    environment: production-infra

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure AWS
        uses: ./.github/actions/setup-aws
        with:
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          role_name: ${{ env.AWS_OIDC_ROLE_NAME }}

      - name: Setup Terraform plugin cache directory
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-plugins-${{ runner.os }}-${{ hashFiles('terraform/**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-plugins-${{ runner.os }}-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Generate terraform.auto.tfvars.json
        uses: ./.github/actions/generate-terraform-tfvars
        with:
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          environment: ${{ env.ENVIRONMENT }}
          vpc_cidr: ${{ env.TF_VPC_CIDR }}
          public_subnets_cidr: ${{ env.TF_PUBLIC_SUBNETS_CIDR }}
          private_subnets_cidr: ${{ env.TF_PRIVATE_SUBNETS_CIDR }}
          azs: ${{ env.TF_AZS }}
          eks_version: ${{ env.TF_EKS_VERSION }}
          node_instance_type: ${{ env.TF_NODE_INSTANCE_TYPE }}
          node_desired_capacity: ${{ env.TF_NODE_DESIRED_CAPACITY }}
          node_min_capacity: ${{ env.TF_NODE_MIN_CAPACITY }}
          node_max_capacity: ${{ env.TF_NODE_MAX_CAPACITY }}
          ecr_backend_repository: ${{ env.ECR_BACKEND_REPOSITORY }}
          github_actions_role_name: ${{ env.AWS_OIDC_ROLE_NAME }}
          github_repository: ${{ github.repository }}
          s3_security_reports_bucket: ${{ env.S3_SECURITY_REPORTS_BUCKET }}
          security_reports_retention_days: ${{ env.SECURITY_REPORTS_RETENTION_DAYS }}
          argocd_repo_url: ${{ env.ARGOCD_REPO_URL }}
          argocd_target_revision: ${{ env.ARGOCD_TARGET_REVISION }}
          argocd_app_namespace: ${{ env.ARGOCD_APP_NAMESPACE }}

      - name: Terraform Init (Services)
        working-directory: terraform/services
        timeout-minutes: 10
        run: terraform init

      - name: Terraform Plan (Services)
        working-directory: terraform/services
        timeout-minutes: 15
        run: terraform plan

      - name: "[3/3] Apply Services State"
        working-directory: terraform/services
        timeout-minutes: 30
        run: |
          terraform apply -auto-approve

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Configure kubectl for EKS
        timeout-minutes: 5
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.PROJECT_NAME }}

      - name: Wait for ArgoCD to be ready
        uses: jupyterhub/action-k8s-await-workloads@v3
        timeout-minutes: 15
        with:
          workloads: "deployment/argocd-server"
          namespace: "argocd"
          timeout: 600
          max-restarts: -1

      - name: Update CloudFront origin with ALB DNS
        timeout-minutes: 10
        uses: ./.github/actions/update-cloudfront-origin
        with:
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          cloudfront_dev_distribution_id: ${{ env.CLOUDFRONT_DEV_DISTRIBUTION_ID }}
          cloudfront_prod_distribution_id: ${{ env.CLOUDFRONT_PROD_DISTRIBUTION_ID }}
          ingress_group_name: eventfund-shared
          origin_id: alb-internal
          timeout_minutes: '8'

      - name: Render alertmanager config with secrets
        env:
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
        run: |
          if [ -n "$ALERT_EMAIL" ] && [ -n "$ALERT_EMAIL_PASSWORD" ]; then
            export ALERT_EMAIL ALERT_EMAIL_PASSWORD
            envsubst < k8s/base/monitoring/alertmanager-config.yaml | kubectl apply -f -
            echo " Alertmanager config applied"
          else
            echo " ALERT_EMAIL or ALERT_EMAIL_PASSWORD not set, skipping alertmanager config"
          fi
