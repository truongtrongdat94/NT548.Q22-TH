name: Manual – Rollback Backend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, prod]
      image_tag:
        description: 'Image tag to rollback to (commit SHA shown in Argo Rollouts UI)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  rollback:
    uses: ./.github/workflows/reusable-deploy-backend.yml
    with:
      image_tag: ${{ inputs.image_tag }}
      environment: ${{ inputs.environment }}
      branch: ${{ inputs.environment == 'prod' && 'master' || 'dev' }}
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
