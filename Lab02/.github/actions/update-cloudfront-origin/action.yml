name: Update CloudFront Origin
description: Update CloudFront distribution with ALB origin from EKS Ingress

inputs:
  aws_region:
    description: 'AWS region'
    required: true
  project_name:
    description: 'Project name for EKS cluster'
    required: true
  cloudfront_dev_distribution_id:
    description: 'CloudFront Dev distribution ID'
    required: true
  cloudfront_prod_distribution_id:
    description: 'CloudFront Prod distribution ID'
    required: true
  ingress_group_name:
    description: 'ALB Ingress group name'
    required: false
    default: 'eventfund-shared'
  origin_id:
    description: 'CloudFront origin ID'
    required: false
    default: 'alb-internal'
  timeout_minutes:
    description: 'Timeout in minutes to wait for Ingress'
    required: false
    default: '5'

outputs:
  alb_dns:
    description: 'ALB DNS name'
    value: ${{ steps.get-alb.outputs.alb_dns }}
  cloudfront_dev_distribution_id:
    description: 'CloudFront Dev distribution ID'
    value: ${{ steps.get-cf.outputs.dev_distribution_id }}
  cloudfront_prod_distribution_id:
    description: 'CloudFront Prod distribution ID'
    value: ${{ steps.get-cf.outputs.prod_distribution_id }}

runs:
  using: composite
  steps:
    - name: Wait for Ingress resources
      id: get-alb
      shell: bash
      run: |
        echo "Waiting for Ingress resources to be synced by ArgoCD..."
        
        TIMEOUT_MINUTES=${{ inputs.timeout_minutes }}
        MAX_ITERATIONS=$((TIMEOUT_MINUTES * 6))  # Check every 10 seconds
        
        for i in $(seq 1 $MAX_ITERATIONS); do
          # Count Ingress with specified group name
          INGRESS_COUNT=$(kubectl get ingress -A \
            -o json 2>/dev/null | jq -r "[.items[] | select(.metadata.annotations.\"alb.ingress.kubernetes.io/group.name\" == \"${{ inputs.ingress_group_name }}\")] | length" || echo "0")
          
          if [ "$INGRESS_COUNT" -gt 0 ]; then
            echo " Found $INGRESS_COUNT Ingress resource(s) with group.name=${{ inputs.ingress_group_name }}"
            
            # Get ALB DNS from first Ingress (all Ingress in same group share one ALB)
            ALB_DNS=$(kubectl get ingress -A \
              -o json 2>/dev/null | jq -r "[.items[] | select(.metadata.annotations.\"alb.ingress.kubernetes.io/group.name\" == \"${{ inputs.ingress_group_name }}\")] | .[0].status.loadBalancer.ingress[0].hostname" || echo "")
            
            if [ -n "$ALB_DNS" ] && [ "$ALB_DNS" != "null" ]; then
              echo " ALB DNS: $ALB_DNS"
              echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
              exit 0
            else
              echo "Ingress exists but ALB not provisioned yet, waiting..."
            fi
          else
            echo "Waiting for ArgoCD to sync Ingress... ($i/$MAX_ITERATIONS)"
          fi
          
          sleep 10
        done

        echo " Could not get ALB DNS after $TIMEOUT_MINUTES minutes"
        echo ""
        echo "Current Ingress resources:"
        kubectl get ingress -A 2>/dev/null || echo "No Ingress resources found"
        echo ""
        echo "You can manually update CloudFront later with:"
        echo "  kubectl get ingress -A"
        echo "  ALB_DNS=\$(kubectl get ingress -n eventfund-dev api-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')"
        exit 1

    - name: Update CloudFront distributions (Dev + Prod)
      shell: bash
      env:
        ALB_DNS: ${{ steps.get-alb.outputs.alb_dns }}
        ORIGIN_ID: ${{ inputs.origin_id }}
        CF_DEV_ID: ${{ inputs.cloudfront_dev_distribution_id }}
        CF_PROD_ID: ${{ inputs.cloudfront_prod_distribution_id }}
      run: |
        echo "CloudFront Dev ID: $CF_DEV_ID"
        echo "CloudFront Prod ID: $CF_PROD_ID"
        echo "New ALB DNS: $ALB_DNS"
        
        # Function to update CloudFront origin DomainName
        update_cloudfront() {
          local CF_ID=$1
          local ENV_NAME=$2
          
          echo ""
          echo "Updating CloudFront $ENV_NAME ($CF_ID)..."
          
          # Get current distribution config
          aws cloudfront get-distribution-config --id "$CF_ID" --output json > /tmp/cf-${ENV_NAME}.json
          ETAG=$(jq -r '.ETag' /tmp/cf-${ENV_NAME}.json)
          
          # Update origin DomainName
          jq --arg dns "$ALB_DNS" --arg id "$ORIGIN_ID" \
            '.DistributionConfig | (.Origins.Items[] | select(.Id == $id) | .DomainName) = $dns' \
            /tmp/cf-${ENV_NAME}.json > /tmp/cf-config-${ENV_NAME}.json
          
          # Apply updated config
          aws cloudfront update-distribution \
            --id "$CF_ID" \
            --if-match "$ETAG" \
            --distribution-config file:///tmp/cf-config-${ENV_NAME}.json \
            --region us-east-1 > /dev/null
          
          echo " CloudFront $ENV_NAME updated: origin '$ORIGIN_ID' now points to $ALB_DNS"
        }
        
        # Update both dev and prod CloudFront distributions
        update_cloudfront "$CF_DEV_ID" "dev"
        update_cloudfront "$CF_PROD_ID" "prod"
        
        echo ""
        echo " Both CloudFront distributions updated successfully"
