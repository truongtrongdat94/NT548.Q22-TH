name: Generate Terraform tfvars
description: Generate terraform.auto.tfvars.json from config outputs

inputs:
  aws_region:
    description: 'AWS region'
    required: true
  project_name:
    description: 'Project name'
    required: true
  environment:
    description: 'Environment'
    required: true
  vpc_cidr:
    description: 'VPC CIDR'
    required: true
  public_subnets_cidr:
    description: 'Public subnets CIDR (JSON array)'
    required: true
  private_subnets_cidr:
    description: 'Private subnets CIDR (JSON array)'
    required: true
  azs:
    description: 'Availability zones (JSON array)'
    required: true
  eks_version:
    description: 'EKS version'
    required: true
  node_instance_type:
    description: 'Node instance type'
    required: true
  node_desired_capacity:
    description: 'Node desired capacity'
    required: true
  node_min_capacity:
    description: 'Node min capacity'
    required: true
  node_max_capacity:
    description: 'Node max capacity'
    required: true
  ecr_backend_repository:
    description: 'ECR backend repository'
    required: true
  github_actions_role_name:
    description: 'GitHub Actions role name'
    required: true
  github_repository:
    description: 'GitHub repository'
    required: true
  s3_security_reports_bucket:
    description: 'S3 security reports bucket'
    required: true
  security_reports_retention_days:
    description: 'Security reports retention days'
    required: true
  argocd_repo_url:
    description: 'ArgoCD repo URL'
    required: true
  argocd_target_revision:
    description: 'ArgoCD target revision'
    required: true
  argocd_app_namespace:
    description: 'ArgoCD app namespace'
    required: true

runs:
  using: composite
  steps:
    - name: Generate terraform.auto.tfvars.json
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Helper function to safely parse array inputs
          function parseArrayInput(input) {
            // If already an array, return it
            if (Array.isArray(input)) {
              return input;
            }
            
            // If string, try multiple parsing strategies
            if (typeof input === 'string') {
              const trimmed = input.trim();
              
              // Try JSON parse first
              try {
                const parsed = JSON.parse(trimmed);
                if (Array.isArray(parsed)) {
                  return parsed;
                }
              } catch (e) {
                // Not valid JSON, continue to other strategies
              }
              
              // Try parsing as comma-separated values
              if (trimmed.includes(',')) {
                return trimmed
                  .replace(/[\[\]"']/g, '') // Remove brackets and quotes
                  .split(',')
                  .map(s => s.trim())
                  .filter(s => s.length > 0);
              }
              
              // Single value, return as array
              return [trimmed.replace(/[\[\]"']/g, '')];
            }
            
            return input;
          }
          
          // Parse inputs
          const publicSubnetsCidrRaw = '${{ inputs.public_subnets_cidr }}';
          const privateSubnetsCidrRaw = '${{ inputs.private_subnets_cidr }}';
          const azsRaw = '${{ inputs.azs }}';
          
          console.log('=== Raw inputs ===');
          console.log('public_subnets_cidr:', publicSubnetsCidrRaw);
          console.log('private_subnets_cidr:', privateSubnetsCidrRaw);
          console.log('azs:', azsRaw);
          
          const publicSubnetsCidr = parseArrayInput(publicSubnetsCidrRaw);
          const privateSubnetsCidr = parseArrayInput(privateSubnetsCidrRaw);
          const azs = parseArrayInput(azsRaw);
          
          console.log('\n=== Parsed arrays ===');
          console.log('public_subnets_cidr:', JSON.stringify(publicSubnetsCidr));
          console.log('private_subnets_cidr:', JSON.stringify(privateSubnetsCidr));
          console.log('azs:', JSON.stringify(azs));
          
          const tfvars = {
            region: "${{ inputs.aws_region }}",
            project_name: "${{ inputs.project_name }}",
            environment: "${{ inputs.environment }}",
            vpc_cidr: "${{ inputs.vpc_cidr }}",
            public_subnets_cidr: publicSubnetsCidr,
            private_subnets_cidr: privateSubnetsCidr,
            azs: azs,
            eks_version: "${{ inputs.eks_version }}",
            node_group_instance_types: ["${{ inputs.node_instance_type }}"],
            node_desired_capacity: parseInt("${{ inputs.node_desired_capacity }}"),
            node_min_capacity: parseInt("${{ inputs.node_min_capacity }}"),
            node_max_capacity: parseInt("${{ inputs.node_max_capacity }}"),
            node_capacity_type: "SPOT",
            ecr_backend_repo: "${{ inputs.ecr_backend_repository }}",
            ssm_prefix: "/${{ inputs.project_name }}/${{ inputs.environment }}/backend",
            github_actions_role_name: "${{ inputs.github_actions_role_name }}",
            github_repos: ["repo:${{ inputs.github_repository }}:*"],
            security_reports_bucket: "${{ inputs.s3_security_reports_bucket }}",
            security_reports_retention_days: parseInt("${{ inputs.security_reports_retention_days }}"),
            argocd_repo_url: "${{ inputs.argocd_repo_url }}",
            argocd_target_revision: "${{ inputs.argocd_target_revision }}",
            argocd_app_namespace: "${{ inputs.argocd_app_namespace }}"
          };
          
          // Generate for base terraform folder (for backward compatibility)
          const baseFilePath = path.join(process.env.GITHUB_WORKSPACE, 'terraform', 'terraform.auto.tfvars.json');
          fs.writeFileSync(baseFilePath, JSON.stringify(tfvars, null, 2));
          console.log(' Generated terraform/terraform.auto.tfvars.json');
          
          // Copy to cluster, services, and persistent folders for 3-state architecture
          const clusterFilePath = path.join(process.env.GITHUB_WORKSPACE, 'terraform', 'cluster', 'terraform.auto.tfvars.json');
          const servicesFilePath = path.join(process.env.GITHUB_WORKSPACE, 'terraform', 'services', 'terraform.auto.tfvars.json');
          const persistentFilePath = path.join(process.env.GITHUB_WORKSPACE, 'terraform', 'persistent', 'terraform.auto.tfvars.json');
          
          fs.writeFileSync(clusterFilePath, JSON.stringify(tfvars, null, 2));
          console.log(' Generated terraform/cluster/terraform.auto.tfvars.json');
          
          fs.writeFileSync(servicesFilePath, JSON.stringify(tfvars, null, 2));
          console.log(' Generated terraform/services/terraform.auto.tfvars.json');
          
          fs.writeFileSync(persistentFilePath, JSON.stringify(tfvars, null, 2));
          console.log(' Generated terraform/persistent/terraform.auto.tfvars.json');
          
          console.log(' Generated terraform.auto.tfvars.json with', Object.keys(tfvars).length, 'variables');
