apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Image tag and newName are defined per-environment in k8s/overlays/{dev,prod}/kustomization.yaml.
# This base kustomization defines the structural resources only; environment-specific values
# (image tags, configmap data, replicas, etc.) live in overlays.

resources:
  - namespace/namespace.yaml
  - secrets/externalsecret-backend.yaml
  - backend/configmap.yaml
  - backend/api-rollout.yaml
  - backend/api-service.yaml
  - backend/api-preview-service.yaml
  - backend/api-analysis-template.yaml
  - backend/api-ingress.yaml
  - backend/api-hpa.yaml
  - backend/indexer-fund-deployment.yaml
  - backend/processor-fund-deployment.yaml
  - backend/indexer-ticket-deployment.yaml
  - backend/processor-ticket-deployment.yaml
  - backend/indexer-marketplace-deployment.yaml
  - backend/processor-marketplace-deployment.yaml
  - backend/worker-deposits-deployment.yaml
  - monitoring/prometheus-rules.yaml
  # alertmanager-config.yaml is applied separately in manual-infra-apply workflow,
  # excluded here to avoid conflict with Prometheus Helm chart.
  # ArgoCD and Grafana ingresses are created in their own namespaces, not via this overlay.
