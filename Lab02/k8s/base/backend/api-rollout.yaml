apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api
  labels:
    app: api
    component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: api
  strategy:
    blueGreen:
      activeService: api-svc
      previewService: api-preview-svc
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 600
      prePromotionAnalysis:
        templates:
          - templateName: api-health-check
        args:
          - name: pod-hash
            valueFrom:
              podTemplateHashValue: Latest
      postPromotionAnalysis:
        templates:
          - templateName: api-health-check
        args:
          - name: pod-hash
            valueFrom:
              podTemplateHashValue: Latest
  template:
    metadata:
      labels:
        app: api
        component: backend
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: api
      containers:
        - name: api
          image: eventfund-backend:latest
          command: ["node", "src/server.js"]
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: eventfund-backend-config
            - secretRef:
                name: eventfund-backend-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
      automountServiceAccountToken: false
