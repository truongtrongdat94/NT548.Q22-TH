apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: api-health-check
spec:
  args:
    - name: namespace
    - name: pod-hash
  metrics:
    # Pod readiness ratio — phải >= 99% (gần như tất cả pod green Ready).
    # Prometheus provider trả về result dạng []float64; phải truy cập result[0].
    - name: pod-ready-ratio
      interval: 30s
      count: 20
      successCondition: len(result) > 0 && result[0] >= 0.99
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090
          query: |
            sum(kube_pod_status_ready{namespace="{{args.namespace}}", pod=~"api-{{args.pod-hash}}-.*", condition="true"})
            /
            (sum(kube_pod_container_status_running{namespace="{{args.namespace}}", container="api", pod=~"api-{{args.pod-hash}}-.*"}) > 0)

    # Restart rate — không pod nào restart trong 2 phút gần nhất.
    # len(result) == 0 nghĩa là không có metric (chưa có pod) → coi như pass.
    - name: pod-restart-rate
      interval: 30s
      count: 20
      successCondition: len(result) == 0 || result[0] <= 0
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090
          query: |
            sum(rate(kube_pod_container_status_restarts_total{namespace="{{args.namespace}}", pod=~"api-{{args.pod-hash}}-.*"}[2m]))
